# Full local dev stack for the GroundBolt/ThunderCloud system.
#
# This file lives in the workspace metarepo because it spans component repos:
# it builds the webapp from ./thundercloud and SymmetricDS from ./symmetricds,
# relying on the sibling layout that ./clone.sh guarantees. Run compose
# commands from the workspace root.
#
# The self-contained test harness (postgres-test + test runner) stays in
# thundercloud/docker-compose.test.yml — thundercloud's CI runs it with no
# sibling checkouts. Run tests from ./thundercloud.

services:
  ground:
    container_name: "ground"
    build:
      context: './thundercloud'
      dockerfile: deploy/Dockerfile
      target: production
    image: sparkmeter
    command: /app/run/webapp
    ports:
      - "8765:5000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://spark:spark@postgres-ground/ground
      METERING_PROVIDER_URL: http://sparknet-http:8080
      # The ground row created on first boot derives its UUID from `serial`
      # via `as_uuid(serial)`. To make this local deployment **be** a
      # specific site (so meters/customers/etc. created here are anchored
      # to the same ground row the cloud has), set these in your `.env`
      # alongside the SYMDS_* values:
      #   INIT_GROUND_SERIAL=<site-serial>
      #   INIT_GROUND_NAME=<site-name>
      #   GROUND_SERIAL=<site-serial>   # matches INIT_GROUND_SERIAL; drives default-ground lookup
      INIT_GROUND_SERIAL: ${INIT_GROUND_SERIAL:-}
      INIT_GROUND_NAME: ${INIT_GROUND_NAME:-}
      SERIAL: ${GROUND_SERIAL:-}
    depends_on:
      postgres-ground:
        condition: service_started
      #sparknet-http:
      #  condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    develop:
      watch:
      - path: ./thundercloud
        action: rebuild

  # Metering provider: the SparkNet controller core with an HTTP+SSE API,
  # which the ground webapp reaches via METERING_PROVIDER_URL. Pulled as the
  # published image — ./sparknet-http is a distribution repo whose Dockerfile
  # wraps prebuilt release binaries, so there is nothing to build from source
  # here. Same service name as the production (ansible) deployment.
  sparknet-http:
    container_name: "sparknet-http"
    image: ghcr.io/earthspark/sparknet-http:latest
    environment:
      # Truthy SPARKNET_HTTP_SIMULATE_GATEWAY makes the provider run its
      # in-memory gateway simulator; unset it to talk to a real gateway over
      # a serial device (set SPARKNET_HTTP_DEVICE and pass the device into
      # the container).
      SPARKNET_HTTP_SIMULATE_GATEWAY: "1"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # POSSIBLE IMPROVEMENTS:
  # - Healthcheck uses psql which requires a full DB connection; could use
  #   pg_isready -U spark which is lighter weight
  # - Could use POSTGRES_HOST_AUTH_METHOD=trust for local dev (no password needed)
  # - Environment uses list format (- POSTGRES_USER=spark); could use map format
  #   (POSTGRES_USER: spark) for consistency with other services
  postgres-ground:
    container_name: "postgres-ground"
    image: library/postgres:18
    environment:
      - POSTGRES_USER=spark
      - POSTGRES_PASSWORD=spark
      - POSTGRES_DB=ground
    ports:
      - "5440:5432"
    healthcheck:
      test: ["CMD", "psql", "-U", "spark", "-d", "ground", "-c", "SELECT 1;"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # SymmetricDS node on the ground side, syncing the ground database
  # against symds-cloud. When the `cloud` profile is not active, sync
  # attempts retry until `--profile cloud` brings up symds-cloud.
  symds-ground:
    container_name: "symds-ground"
    build:
      context: './symmetricds'
    image: symmetricds
    environment:
      DATABASE_URL: postgresql://spark:spark@postgres-ground/ground
      ENGINE_NAME: ground-engine
      # GROUP_ID must match `sparkmeter.database.sync.SYNC_GROUP_GROUND`
      # (= "ground-group"), which is the source side of the configured
      # ground-group → cloud-group node_group_link. Without this, the
      # cloud SymmetricDS refuses registration with "Registration was
      # not open" because no matching link exists.
      GROUP_ID: ground-group
      # Local-only defaults assume the cloud profile is running side-by-side
      # (symds-cloud + postgres-cloud + cloud webapp). To point at a real
      # cloud endpoint, set these in your `.env`:
      #   SYMDS_PROTOCOL=https
      #   SYMDS_REGISTRATION_URL=https://<serial>-sync.<rootDomain>/sync/cloud
      #   SYMDS_EXTERNAL_ID=<serial>
      #   SYMDS_HTTP_USERNAME=symds
      #   SYMDS_HTTP_PASSWORD=<...>
      EXTERNAL_ID: ${SYMDS_EXTERNAL_ID:-ground}
      PROTOCOL: ${SYMDS_PROTOCOL:-http}
      REGISTRATION_URL: ${SYMDS_REGISTRATION_URL:-http://symds-cloud:31415/sync/cloud-engine}
      SYNC_URL: ${SYMDS_SYNC_URL:-http://symds-ground:31415/sync/ground-engine}
      HTTP_USERNAME: ${SYMDS_HTTP_USERNAME:-}
      HTTP_PASSWORD: ${SYMDS_HTTP_PASSWORD:-}
    depends_on:
      postgres-ground:
        condition: service_started

  postgres-cloud:
    container_name: "postgres-cloud"
    image: library/postgres:18
    environment:
      - POSTGRES_USER=spark
      - POSTGRES_PASSWORD=spark
      - POSTGRES_DB=cloud
    ports:
      - "5441:5432"
    healthcheck:
      test: ["CMD", "psql", "-U", "spark", "-d", "cloud", "-c", "SELECT 1;"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - cloud

  cloud:
    container_name: "cloud"
    image: sparkmeter
    command: /app/run/webapp
    ports:
      - "5010:5000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://spark:spark@postgres-cloud/cloud
      SM_HEROKU: "true"
    depends_on:
      - postgres-cloud
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    develop:
      watch:
      - path: ./thundercloud
        action: rebuild
    profiles:
      - cloud

  # SymmetricDS node on the cloud side, syncing the cloud database.
  symds-cloud:
    container_name: "symds-cloud"
    build:
      context: './symmetricds'
    image: symmetricds
    environment:
      DATABASE_URL: postgresql://spark:spark@postgres-cloud/cloud
      PROTOCOL: http
      ENGINE_NAME: cloud-engine
      EXTERNAL_ID: cloud
      # GROUP_ID must match `sparkmeter.database.sync.SYNC_GROUP_CLOUD`
      # (= "cloud-group") so the local symds-cloud is the destination of
      # the configured ground-group → cloud-group node_group_link.
      GROUP_ID: cloud-group
      SYNC_URL: http://symds-cloud:31415/sync/cloud-engine
    depends_on:
      postgres-cloud:
        condition: service_started
    ports:
      - "31415:31415"
    profiles:
      - cloud


networks:
  default:
    name: sparkapp
